<!DOCTYPE html>

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 8%; border-bottom: 1px solid #f0f0f0;">

        <div style="display: flex; gap: 30px;">

                    <div style="font-size: 16px; font-weight: 600; color: #B88E2F;">Rs. 224,000.00</div>
