<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results - Furniro</title>
    <link rel="stylesheet" href="css/search.css">
</head>
<body>

    <nav class="search-nav">
        <div class="brand">Furniro</div>
        <div class="nav-links">
            <a href="home.html">Home</a>
            <a href="shop.html">Shop</a>
            <a href="product.html">Comparison</a>
        </div>
    </nav>

    <div class="search-page">
        <h1>Search Products</h1>
        
        <form class="search-form">
            <input type="text" placeholder="Search for sofas, chairs, tables...">
            <button type="submit">Search</button>
        </form>

        <h2 class="search-results-heading">Showing results for "Sofa"</h2>

        <div class="search-grid">
            
            <div class="search-card">
                <div class="search-card-image">[ Asgaard Sofa Image ]</div>
                <div class="search-card-body">
                    <h3>Asgaard Sofa</h3>
                    <p>Luxury 3-seater sofa</p>
                    <div class="search-card-price">Rs. 250,000.00</div>
                </div>
            </div>

            <div class="search-card">
                <div class="search-card-image">[ Outdoor Sofa Image ]</div>
                <div class="search-card-body">
                    <h3>Outdoor Sofa Set</h3>
                    <p>Perfect for gardens</p>
                    <div class="search-card-price">Rs. 224,000.00</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
