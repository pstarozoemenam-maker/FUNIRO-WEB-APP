<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Furniro - Checkout</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
         <div class="logo">
        <a href="index.html">
          <img
            src="images/logo1.png"
            alt="Furniro Logo"
          />
          <h1>
            Furniro
          </h1>
        </a>
      </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
       
         <div class="nav-icons">
        <a href="#"><i class="fa fa-user" aria-hidden="true"></i></a>
        <a href="comparison.html"><i class="fa fa-heart" aria-hidden="true"></i></a>
         <a href="search.html"><i class="fa fa-search" aria-hidden="true"></i></a>
         <a href="cart.html"><i class="fa fa-shopping-cart" aria-hidden="true"></i></a>
      </div>
    </header>

    <div class="page-banner">
        <h1>Checkout</h1>
        <div class="breadcrumb"><a href="index.html">Home</a> &gt; Checkout</div>
    </div>

    <main class="checkout-layout">
        <form class="billing-form">
            <h2>Billing details</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text">
                </div>
            </div>
            <div class="form-group">
                <label>Company Name (Optional)</label>
                <input type="text">
            </div>
            <div class="form-group">
                <label>Country / Region</label>
                <select><option>Sri Lanka</option></select>
            </div>
            <div class="form-group">
                <label>Street address</label>
                <input type="text">
            </div>
        </form>

        <div class="order-panel">
            <div class="order-summary">
                <div class="summary-row summary-header">
                    <span>Product</span>
                    <span>Subtotal</span>
                </div>
                <div class="summary-row">
                    <span class="text-light">Asgaard sofa × 1</span>
                    <span>Rs. 250,000.00</span>
                </div>
                <div class="summary-row summary-total">
                    <span>Total</span>
                    <span class="total-price">Rs. 250,000.00</span>
                </div>
            </div>

            <div class="payment-methods">
                <div class="method-option">
                    <input type="radio" id="bank" name="payment" checked>
                    <label for="bank">Direct Bank Transfer</label>
                    <p class="method-description">Make your payment directly into our bank account. Please use your Order ID as the payment reference.</p>
                </div>
                <div class="method-option">
                    <input type="radio" id="cod" name="payment">
                    <label for="cod">Cash On Delivery</label>
                </div>
            </div>

            <button class="place-order-btn">Place order</button>
        </div>
    </main>
</body>
</html>
